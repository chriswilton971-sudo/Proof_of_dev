name: CI

on:
  push:
    branches:
      - main
      - 'ci/**'
  pull_request:

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install system dependencies (for zeromq native build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev build-essential pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      - name: Generate scoring
        run: npm run generate:scoring

      - name: Run scoring tests (demo mode)
        env:
          MOCK_CHAIN_DATA: '1'
        run: npm run test:scoring

  contracts:
    runs-on: ubuntu-latest
    needs: lint-build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile Solidity contracts
        run: npm run compile:contracts --if-present

  rust-check:
    runs-on: ubuntu-latest
    needs: lint-build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Rust project
        id: rust-check-exists
        run: |
          if [ -f "Cargo.toml" ] || find . -maxdepth 3 -name "Cargo.toml" | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.rust-check-exists.outputs.found == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: cargo check
        if: steps.rust-check-exists.outputs.found == 'true'
        run: cargo check --workspace --all-targets

  sync-lockfile:
    runs-on: ubuntu-latest
    needs: lint-build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies (for zeromq native build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev build-essential pkg-config

      - name: Regenerate package-lock.json
        run: npm install --package-lock-only

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet package-lock.json; then
            git add package-lock.json
            git commit -m "chore: sync package-lock.json [skip ci]"
            git push
          else
            echo "package-lock.json already in sync"
          fi
