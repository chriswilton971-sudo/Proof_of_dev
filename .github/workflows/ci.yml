name: CI

# Runs automatically on every push and pull request so `npm install` and the
# rest of the toolchain are always verified against a clean environment —
# nobody has to remember to run this locally before merging.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  # Demo/mock mode so CI never needs real Alchemy/Etherscan/WalletConnect keys.
  MOCK_CHAIN_DATA: "1"

jobs:
  # Generates a real package-lock.json against the live npm registry and
  # commits it straight to the branch — this runner has genuine unrestricted
  # network access, which is exactly what a correct lockfile requires (every
  # resolved URL and integrity hash has to come from npm's actual resolver,
  # not be hand-written). Once a lockfile exists, later runs are a no-op diff
  # and nothing gets committed.
  sync-lockfile:
    name: Generate/update package-lock.json
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}

      - name: npm install (resolves + writes package-lock.json for real)
        run: npm install

      - name: Commit lockfile if it changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync package-lock.json [skip ci]"
          file_pattern: package-lock.json

  install-and-verify:
    name: Install, lint, build, test
    runs-on: ubuntu-latest
    needs: [sync-lockfile]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Node version from .nvmrc
        id: nvmrc
        run: echo "version=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvmrc.outputs.version }}
          cache: npm

      # Uses package-lock.json if the sync-lockfile job (or a prior run) has
      # committed one; otherwise resolves fresh against package.json. Either
      # way this is a real npm install against the live registry.
      - name: npm install (root + all workspaces)
        run: npm install

      - name: Generate scoring spec
        run: npm run generate:scoring

      - name: Lint web app
        run: npm run lint

      - name: Run scoring parity tests
        run: npm run test:scoring

      - name: Build web app
        run: npm run build

  solidity-check:
    name: Solidity compile check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # compile-contract.js uses the solc npm/JS package directly, so no
      # system solc binary install is needed here anymore.
      - name: npm install
        run: npm install

      - name: Compile ProofOfDev.sol
        run: node scripts/compile-contract.js

  indexer-check:
    name: Rust indexer check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest runners ship with a recent stable Rust toolchain already,
      # so there's nothing extra to install here.
      - name: cargo check
        working-directory: services/indexer
        run: cargo check --locked

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
