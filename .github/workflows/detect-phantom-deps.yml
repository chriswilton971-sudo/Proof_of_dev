# .github/workflows/detect-phantom-deps.yml
#
# Detects "phantom" dependencies in package.json — packages that are
# referenced but don't actually exist on the npm registry (or in a
# local workspace folder). Fails with a clear, specific error instead
# of the cryptic `npm ci: Missing X from lock file` message.
#
# Run this BEFORE `npm ci` in any workflow, or on its own via manual
# dispatch when you add a new dependency.

name: Detect Phantom Dependencies

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - "package.json"

jobs:
  check-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan dependencies for unresolved packages
        run: |
          node <<'EOF'
          const fs = require("fs");
          const https = require("https");

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const deps = {
            ...(pkg.dependencies || {}),
            ...(pkg.devDependencies || {}),
          };

          const workspacePatterns = ["file:", "workspace:", "link:", "portal:"];

          function isWorkspaceRef(version) {
            return workspacePatterns.some((p) => version.startsWith(p));
          }

          function checkRegistry(name) {
            return new Promise((resolveP) => {
              https
                .get(`https://registry.npmjs.org/${encodeURIComponent(name)}`, (res) => {
                  resolveP(res.statusCode === 200);
                  res.resume();
                })
                .on("error", () => resolveP(false));
            });
          }

          (async () => {
            const problems = [];
            for (const [name, version] of Object.entries(deps)) {
              if (isWorkspaceRef(version)) continue; // local workspace ref, skip registry check
              const exists = await checkRegistry(name);
              if (!exists) {
                problems.push(`  - ${name}@${version} (404 on public npm registry)`);
              }
            }

            if (problems.length > 0) {
              console.error("❌ Found dependencies that don't exist on the public npm registry:");
              console.error(problems.join("\n"));
              console.error(
                "\nIf these are meant to be internal/workspace packages, either:"
              );
              console.error("  1. Point them to a local path, e.g. \"file:packages/chain-data-spec\"");
              console.error("  2. Publish them to a private registry and configure .npmrc accordingly");
              console.error("  3. Remove them from package.json if they're no longer needed");
              process.exit(1);
            } else {
              console.log("✓ All dependencies resolve on the public npm registry.");
            }
          })();
          EOF
